# Generated by GithubActionsGenerator 0.24.1 [mxlabs: 1.3.0]

name: build scaffold docs
on:
  push:
    branches:
      - main # Merge to main
    tags:
      - "*" # Any tags
    paths:
      - ".github/workflows/docs.yml"
      - "**"
  pull_request:
    paths:
      - ".github/workflows/docs.yml"
      - "**"
    branches:
      - "*" # PR to main

# cancel previous workflow from same PR/branch/tag if new one is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYPI_REPOSITORY: https://europe-west1-python.pkg.dev/mx-labs-devops/labs-pypi-registry
  LIB_DIR: .
  DEP_GROUP: docs
  UV_CACHE_DIR: /tmp/.uv-cache
  UV_KEYRING_PROVIDER: subprocess
  UV_VERSION: 0.9.3

jobs:
  test-and-publish:
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ${{ env.LIB_DIR }}
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: prep_context
        name: Prepare build outputs
        run: |
          version=$(sed -n 's/^version.*"\(.*\)"/\1/p' pyproject.toml)

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            tag="${GITHUB_REF#refs/tags/}"
            echo "package_version=${tag#v}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "package_version=${version}.dev0+$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          else
            echo "package_version=${version}.dev1+$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          export_environment_variables: true
          create_credentials_file: true
          token_format: access_token
          workload_identity_provider: ${{vars.WIF_PROVIDER}}
          service_account: ${{vars.SA_EMAIL}}
          access_token_lifetime: 1200s

      - name: Install UV
        run: |
          curl -LsSf https://astral.sh/uv/${{ env.UV_VERSION }}/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build docs
        run: |
          uv sync --frozen --group docs
          uv run sphinx-build docs docs/_build/html

      - name: Deploy docs
        if: github.ref == 'refs/heads/main' || github.ref_type == 'tag'
        run: |
          cd docs && gcloud app deploy --project=mx-labs-devops --version=v2 --quiet
